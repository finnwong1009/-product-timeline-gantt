<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品规划时间轴</title>
  <style>
    :root,
    :root[data-theme="pink"] {
      --bg: #fff5fb;
      --panel: #fffdfd;
      --line: #efc9d9;
      --line-soft: #f8dde8;
      --text: #6f3552;
      --muted: #9d6a83;
      --blue: #f27eb4;
      --green: #f7a9c8;
      --orange: #ff9fb3;
      --red: #ff739d;
      --purple: #d88bf2;
      --shadow: 0 12px 30px rgba(233, 130, 176, 0.16);
      --bg-overlay-a: rgba(255, 215, 232, 0.7);
      --bg-overlay-b: rgba(255, 231, 240, 0.85);
      --bg-start: #fff8fc;
      --bg-end: #fff5fb;
      --title: #c74382;
      --accent: #e85b9a;
      --chip-bg: #fff6fb;
      --chip-active-border: #f5a9c7;
      --chip-active-bg: #ffd9ea;
      --chip-active-text: #c74382;
      --button-hover-border: #e79abc;
      --button-hover-bg: #fff2f8;
      --panel-soft: #fff6fb;
      --panel-item: #fff7fb;
      --panel-item-active: #ffe0ee;
      --panel-item-active-border: #f1a4c4;
      --primary-btn: #ff82b5;
      --primary-btn-hover: #f0629c;
      --relation-line: #db8cad;
      --event-neutral: rgba(199, 67, 130, 0.22);
      --event-important: rgba(255, 115, 157, 0.85);
      --event-us: rgba(242, 126, 180, 0.72);
      --event-jp: rgba(216, 139, 242, 0.72);
      --event-kr: rgba(247, 169, 200, 0.82);
      --event-label-bg: rgba(255, 251, 253, 0.96);
      --refresh-note: #c74382;
    }

    :root[data-theme="sky"] {
      --bg: #eef8ff;
      --panel: #ffffff;
      --line: #c6ddf2;
      --line-soft: #ddecf9;
      --text: #2d5d83;
      --muted: #6b8aa5;
      --blue: #71b8f5;
      --green: #9ad8ff;
      --orange: #7cd4f8;
      --red: #4aa8ef;
      --purple: #97b6ff;
      --shadow: 0 12px 30px rgba(96, 167, 223, 0.16);
      --bg-overlay-a: rgba(207, 236, 255, 0.85);
      --bg-overlay-b: rgba(228, 245, 255, 0.95);
      --bg-start: #f6fbff;
      --bg-end: #eef8ff;
      --title: #3d90d0;
      --accent: #51a9ee;
      --chip-bg: #f3fbff;
      --chip-active-border: #9cd0f5;
      --chip-active-bg: #dff3ff;
      --chip-active-text: #2f83c4;
      --button-hover-border: #9ccdf0;
      --button-hover-bg: #f1faff;
      --panel-soft: #f4fbff;
      --panel-item: #f5fbff;
      --panel-item-active: #dff3ff;
      --panel-item-active-border: #9ccff1;
      --primary-btn: #69b7f1;
      --primary-btn-hover: #4da6ea;
      --relation-line: #8cb9dc;
      --event-neutral: rgba(74, 168, 239, 0.24);
      --event-important: rgba(74, 168, 239, 0.75);
      --event-us: rgba(74, 168, 239, 0.72);
      --event-jp: rgba(151, 182, 255, 0.72);
      --event-kr: rgba(154, 216, 255, 0.9);
      --event-label-bg: rgba(247, 252, 255, 0.96);
      --refresh-note: #2f83c4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, var(--bg-overlay-a), transparent 28%),
        radial-gradient(circle at top right, var(--bg-overlay-b), transparent 34%),
        linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
      color: var(--title);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: flex;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    input[type="date"], input[type="range"], select {
      height: 38px;
      min-width: 154px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffafd;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    input[type="range"] {
      width: 172px;
      min-width: 172px;
      padding: 0;
      border: 0;
      background: transparent;
      accent-color: var(--accent);
    }

    .zoom-label {
      color: var(--text);
      font-size: 12px;
      font-weight: 760;
    }

    .zoom-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .zoom-chip {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--chip-bg);
    }

    .zoom-chip.active {
      border-color: var(--chip-active-border);
      background: var(--chip-active-bg);
      color: var(--chip-active-text);
    }

    .history-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .share-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .history-btn[disabled] {
      cursor: not-allowed;
      opacity: 0.45;
      background: #f8fafc;
    }

    button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffafd;
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(233, 130, 176, 0.08);
    }

    button:hover {
      border-color: var(--button-hover-border);
      background: var(--button-hover-bg);
    }

    .board {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .left-head,
    .timeline-head {
      min-height: 92px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .left-head {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 14px 12px;
      border-right: 1px solid var(--line);
      position: sticky;
      left: 0;
      z-index: 6;
    }

    .left-title {
      font-size: 15px;
      font-weight: 750;
    }

    .left-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .timeline-head {
      position: relative;
      overflow: hidden;
      min-width: var(--timeline-width, 1200px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .month-row,
    .day-row {
      position: relative;
      height: 46px;
    }

    .year-cell,
    .month-cell,
    .day-cell {
      position: absolute;
      top: 0;
      bottom: 0;
      border-left: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      padding-left: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
    }

    .year-cell {
      justify-content: center;
      padding-left: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 820;
      border-bottom: 1px solid var(--line);
    }

    .month-cell {
      color: var(--text);
      font-weight: 750;
      border-bottom: 1px solid var(--line);
    }

    .day-cell {
      top: 26px;
      bottom: auto;
      height: 20px;
      border-left-color: transparent;
      color: var(--muted);
      font-size: 11px;
    }

    .rows {
      display: contents;
    }

    .product-cell,
    .bar-cell {
      min-height: 128px;
      border-bottom: 1px solid var(--line-soft);
    }

    .product-cell {
      padding: 14px 12px;
      border-right: 1px solid var(--line);
      background: #fffdfd;
      position: sticky;
      left: 0;
      z-index: 4;
    }

    .product-cell[draggable="true"] {
      cursor: grab;
    }

    .product-cell.drag-over {
      background: var(--control-bg);
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    .product-cell.dragging {
      opacity: 0.55;
    }

    .product-name {
      font-size: 14px;
      font-weight: 760;
      margin-bottom: 4px;
    }

    .product-name.child {
      padding-left: 16px;
      position: relative;
    }

    .product-name.child::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 8px;
      width: 8px;
      height: 1px;
      background: var(--relation-line);
    }

    .product-market {
      color: var(--muted);
      font-size: 12px;
    }

    .product-price {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-size: 11px;
      font-weight: 720;
    }

    .price-band-tag {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--control-bg);
      color: var(--primary);
      font-size: 10px;
      font-weight: 780;
    }

    .product-relation {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .bar-cell {
      position: relative;
      overflow: hidden;
      min-width: var(--timeline-width, 1200px);
    }

    .grid-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--line-soft);
      pointer-events: none;
      z-index: 1;
    }

    .segment {
      position: absolute;
      height: 24px;
      min-width: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 5px 14px rgba(15, 23, 42, 0.14);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      z-index: 2;
    }

    .segment.compact {
      padding: 0 4px;
      font-size: 9px;
    }

    .segment.micro {
      padding: 0 5px;
      justify-content: center;
      font-size: 9px;
      min-width: 40px;
      overflow: visible;
    }

    .segment.milestone {
      min-width: 54px;
      border-radius: 999px;
      box-shadow: 0 5px 14px rgba(15, 23, 42, 0.18), 0 0 0 2px rgba(255, 255, 255, 0.8);
      z-index: 4;
    }

    .segment-date-label {
      position: absolute;
      height: 14px;
      max-width: 72px;
      padding: 0 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line-soft);
      color: var(--text);
      font-size: 10px;
      font-weight: 720;
      line-height: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transform: translateY(-2px);
      z-index: 5;
      pointer-events: none;
    }

    .segment.blue { background: var(--blue); }
    .segment.green { background: var(--green); }
    .segment.orange { background: var(--orange); }
    .segment.purple { background: var(--purple); }
    .segment.red { background: var(--red); }

    .event-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      transform: translateX(-1px);
      background: repeating-linear-gradient(
        to bottom,
        var(--event-neutral) 0,
        var(--event-neutral) 7px,
        transparent 7px,
        transparent 13px
      );
      z-index: 1;
      pointer-events: none;
    }

    .event-line.important {
      width: 3px;
      transform: translateX(-1.5px);
      background: repeating-linear-gradient(
        to bottom,
        var(--event-important) 0,
        var(--event-important) 8px,
        transparent 8px,
        transparent 14px
      );
    }

    .event-line.us {
      background: repeating-linear-gradient(to bottom, var(--event-us) 0, var(--event-us) 7px, transparent 7px, transparent 13px);
    }

    .event-line.jp {
      background: repeating-linear-gradient(to bottom, var(--event-jp) 0, var(--event-jp) 7px, transparent 7px, transparent 13px);
    }

    .event-line.kr {
      background: repeating-linear-gradient(to bottom, var(--event-kr) 0, var(--event-kr) 7px, transparent 7px, transparent 13px);
    }

    .event-label {
      position: absolute;
      top: 4px;
      transform: translateX(6px);
      border-radius: 6px;
      background: var(--event-label-bg);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 3px 6px;
      font-size: 11px;
      font-weight: 780;
      white-space: nowrap;
      z-index: 4;
    }

    .event-label.minor {
      opacity: 0.82;
      font-weight: 700;
    }

    .toolbar-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .refresh-note {
      color: var(--refresh-note);
      font-weight: 700;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .workspace.editor-collapsed {
      grid-template-columns: minmax(0, 1fr) 0;
    }

    .editor {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .workspace.editor-collapsed .editor {
      display: none;
    }

    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .editor-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .editor-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .product-list {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .product-list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .product-list-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mini-btn {
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .product-list-items {
      display: grid;
      gap: 8px;
    }

    .product-item-row {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    .product-item-row.dragging {
      opacity: 0.45;
    }

    .product-item-row.drag-over .product-item {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .product-export-check {
      margin-top: 11px;
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .product-item {
      width: 100%;
      text-align: left;
      height: auto;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--panel-item);
    }

    .product-item.active {
      border-color: var(--panel-item-active-border);
      background: var(--panel-item-active);
    }

    .product-item-name {
      font-size: 13px;
      font-weight: 760;
      color: var(--text);
    }

    .product-item-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .product-item-meta.sub {
      padding-left: 12px;
    }

    .editor-form {
      display: grid;
      gap: 12px;
    }

    .task-list {
      display: grid;
      gap: 10px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .editor-form input[type="text"],
    .editor-form input[type="date"],
    .editor-form select,
    .editor-form textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffafd;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      font-size: 14px;
    }

    .editor-form textarea {
      min-height: 78px;
      resize: vertical;
    }

    .task-box {
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: var(--panel-item);
      padding: 10px 12px;
    }

    .task-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .task-title {
      font-size: 13px;
      font-weight: 760;
    }

    .task-index {
      color: var(--muted);
      font-size: 11px;
    }

    .task-tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .task-summary {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete-task-btn {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #fffafd;
    }

    .task-body {
      display: none;
      padding-top: 10px;
    }

    .task-box.expanded .task-body {
      display: block;
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .editor-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .copy-tasks-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .primary-btn {
      background: var(--primary-btn);
      border-color: var(--primary-btn);
      color: #fff;
    }

    .primary-btn:hover {
      background: var(--primary-btn-hover);
      border-color: var(--primary-btn-hover);
    }

    .milestones {
      margin-top: 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .milestone-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .milestone-head h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend i {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }

    .promo-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .promo-card {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      padding: 12px;
      min-height: 86px;
      background: #fbfcfe;
    }

    .promo-country {
      font-size: 13px;
      font-weight: 780;
      margin-bottom: 8px;
    }

    .promo-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    .empty {
      padding: 40px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 920px) {
      .app {
        padding: 14px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      .board {
        grid-template-columns: 140px minmax(720px, 1fr);
        overflow-x: auto;
      }

      .promo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .editor {
        position: static;
      }
    }

    @media (max-width: 620px) {
      .editor-grid,
      .task-grid {
        grid-template-columns: 1fr;
      }

      .promo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <section class="topbar">
        <div>
          <h1>产品规划时间轴</h1>
        </div>
        <div class="controls">
          <label>
            开始时间
            <input id="startDate" type="date" value="2026-04-01">
          </label>
          <label>
            结束时间

  <script>
    const dayMs = 24 * 60 * 60 * 1000;

    const startInput = document.getElementById("startDate");

    const zoomChips = [...document.querySelectorAll(".zoom-chip")];
    const monthRow = document.getElementById("monthRow");
    const dayRow = document.getElementById("dayRow");
    const rows = document.getElementById("rows");
    const promoGrid = document.getElementById("promoGrid");

    const copyTasksSource = document.getElementById("copyTasksSource");
    const copyTasksBtn = document.getElementById("copyTasksBtn");
    const newProductBtn = document.getElementById("newProductBtn");
    const saveProductBtn = document.getElementById("saveProductBtn");
    const clearEditorBtn = document.getElementById("clearEditorBtn");
    const deleteProductBtn = document.getElementById("deleteProductBtn");
    const productList = document.getElementById("productList");
    const productCount = document.getElementById("productCount");
    const formProductName = document.getElementById("formProductName");
